name: technology_config
description: this is a plant
technologies:
  ng_feedstock:
    performance_model:
      model: FeedstockPerformanceModel
    cost_model:
      model: FeedstockCostModel
    model_inputs:
      shared_parameters:
        commodity: natural_gas
        commodity_rate_units: MMBtu/h
      performance_parameters:
        rated_capacity: 1920.  # MMBtu/h TODO: UPDATE BASED ON PLANT CAPACITY 0.192 MMBtu/kg H2, 240 tonnes/day = 10,000 kg/hr = 1920 MMBtu/hr
      cost_parameters:
        cost_year: 2022
        price: 4.2  # USD/MMBtu
        annual_cost: 0.
        start_up_cost: 0.
  grid_feedstock:
    performance_model:
      model: FeedstockPerformanceModel
    cost_model:
      model: FeedstockCostModel
    model_inputs:
      shared_parameters:
        commodity: electricity
        commodity_rate_units: MW
      performance_parameters:
        rated_capacity: 8.8  # TODO: UPDATE BASED ON PLANT CAPACITY 0.88 kWh/kg H2, 240 tonnes/day = 10,000 kg/hr = 8.8 MW
      cost_parameters:
        commodity_amount_units: MW*h
        cost_year: 2022
        price: 58.02  # USD/MWh, UPDATE
        annual_cost: 0.
        start_up_cost: 0.
  smr:
    performance_model:
      model: SteamMethaneReformerPerformanceModel
    cost_model:
      model: SteamMethaneReformerCostModel
    model_inputs:
      performance_parameters:
        system_capacity_tonnes_per_day: 240.0  # TODO: UPDATE BASED ON PLANT CAPACITY OF NEDSIM
        natural_gas_usage_mmbtu_per_kg: 0.192
        electricity_usage_kwh_per_kg: 0.88
      cost_parameters:
        # Linear interpolated to technology year 2027
        capex_per_kw: 642  # $/kW based on ReEDS https://natlabrockies.github.io/ReEDS-2.0/model_documentation.html#hydrogen-production-assumptions
        fixed_opex_per_kw_per_year: 20.67  # $/kW/year based on ReEDS https://natlabrockies.github.io/ReEDS-2.0/model_documentation.html#hydrogen-production-assumptions
        variable_opex_per_kwh: 0.087  # $/kWh based on ReEDS https://natlabrockies.github.io/ReEDS-2.0/model_documentation.html#hydrogen-production-assumptions
        cost_year: 2022
